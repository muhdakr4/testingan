<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konverter SHA-256</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        textarea { width: 100%; height: 100px; margin: 10px 0; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .result { background: #e9ecef; padding: 15px; word-break: break-all; border-radius: 4px; border: 1px solid #ddd; min-height: 40px; font-family: monospace; }
        h2 { margin-top: 0; color: #333; }
        label { font-weight: bold; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>SHA-256 Hasher</h2>
    <label for="inputText">Masukkan Kalimat:</label>
    <textarea id="inputText" placeholder="Ketik sesuatu di sini..." oninput="generateHash()"></textarea>

    <label>Hasil Hash (SHA-256):</label>
    <div id="outputHash" class="result">Menunggu input...</div>
</div>

<script>
    async function generateHash() {
        const text = document.getElementById('inputText').value;
        if (!text) {
            document.getElementById('outputHash').innerText = "Menunggu input...";
            return;
        }

        // Mengonversi teks ke format ArrayBuffer
        const msgUint8 = new TextEncoder().encode(text);                           
        // Melakukan hashing menggunakan Web Crypto API
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);           
        // Mengonversi buffer ke array byte
        const hashArray = Array.from(new Uint8Array(hashBuffer));                     
        // Mengonversi byte ke string hexadesimal
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join(''); 
        
        document.getElementById('outputHash').innerText = hashHex;
    }
</script>

</body>
</html>
